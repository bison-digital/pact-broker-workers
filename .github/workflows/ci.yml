name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Test, and Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run type-check
      - run: pnpm run test:run

  wrangler-routes-guard:
    name: Guard — no routes block in wrangler.jsonc.tmpl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail if wrangler.jsonc.tmpl contains a routes block
        run: |
          if grep -E '^\s*"routes"\s*:' wrangler.jsonc.tmpl; then
            echo "::error file=wrangler.jsonc.tmpl::A 'routes' block was re-added."
            echo "Custom-domain routing is owned by Terraform"
            echo "(infra/main.tf → cloudflare_workers_custom_domain.pact_broker)."
            echo "Remove the routes block. See the comment in wrangler.jsonc.tmpl."
            exit 1
          fi
          echo "OK — no routes block."

  infra-validate:
    name: Terraform fmt + validate
    # Runs on every PR, no credentials required. Catches HCL breakage.
    # The full `terraform plan` lives in infra-plan below and is
    # conditional on a repo-level var that only downstream forks set
    # (the upstream can't plan without operator-specific credentials).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra
      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: infra
      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: infra

  infra-plan:
    name: Terraform Plan (staging)
    # Only runs on forks that have configured the `staging` GitHub
    # Environment with AWS + Cloudflare credentials. Set the repo-level
    # variable `INFRA_DEPLOY_ENABLED=true` to opt in. On the upstream
    # agnostic repo, this is off by design — plans need operator
    # credentials that upstream doesn't (and shouldn't) hold.
    if: vars.INFRA_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_worker_name: ${{ vars.WORKER_NAME }}
      TF_VAR_secrets_prefix: ${{ vars.SECRETS_PREFIX }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=pact-broker-workers/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"
        working-directory: infra

      - name: Select workspace
        run: terraform workspace select -or-create "${{ vars.TF_WORKSPACE }}"
        working-directory: infra

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false
        working-directory: infra
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = process.env.PLAN || 'No plan output captured.';
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated, see workflow logs for full output)'
              : plan;
            const body = `#### Terraform Plan (staging) \`${{ steps.plan.outcome }}\`

            <details><summary>Show plan</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} in ${{ github.event.pull_request.html_url }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
