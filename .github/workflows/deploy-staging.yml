name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  checks:
    name: Lint, Test, and Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run type-check
      - run: pnpm run test:run

  deploy:
    name: Deploy to Staging
    needs: checks
    # Only runs on forks that have configured staging credentials. Set
    # repo-level var `INFRA_DEPLOY_ENABLED=true` to enable. Upstream has
    # no credentials to deploy with, so this is skipped there.
    if: vars.INFRA_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      # Credentials (AWS + Cloudflare) come from repo-level secrets.
      # Operator config (account IDs, domain, worker name, secrets prefix)
      # comes from env-level + repo-level GH Actions vars. Nothing
      # operator-specific is committed in this repo.
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_terraform_state_bucket: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_worker_name: ${{ vars.WORKER_NAME }}
      TF_VAR_secrets_prefix: ${{ vars.SECRETS_PREFIX }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=pact-broker-workers/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"
        working-directory: infra

      - name: Select workspace
        run: terraform workspace select -or-create "${{ vars.TF_WORKSPACE }}"
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        working-directory: infra

      - name: Health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "https://${DOMAIN}/health"; then
              echo " Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Authenticated smoke test
        # /health only confirms the Worker is up; this exercises the real
        # auth path by listing pacticipants. Requires SMOKE_TEST_BROKER_TOKEN
        # matching the value seeded into
        # <secrets_prefix>/<workspace>/pact-broker-token.
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          BROKER_TOKEN: ${{ secrets.SMOKE_TEST_BROKER_TOKEN }}
        run: |
          if [ -z "$BROKER_TOKEN" ]; then
            echo "SMOKE_TEST_BROKER_TOKEN not set — skipping authenticated smoke test."
            echo "Add it as an environment secret matching the seeded PACT_BROKER_TOKEN to enable end-to-end CI verification."
            exit 0
          fi
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $BROKER_TOKEN" \
            "https://${DOMAIN}/pacticipants")
          if [ "$status" != "200" ]; then
            echo "Authenticated smoke test failed — got HTTP $status for GET /pacticipants"
            exit 1
          fi
          echo "Authenticated smoke test passed (HTTP 200)"
